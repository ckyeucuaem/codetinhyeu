<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vũ Trụ Tình Yêu Vĩnh Cửu - Cinematic Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03020e;
            font-family: 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Lớp phủ Glassmorphism cao cấp */
        .overlay {
            position: absolute;
            bottom: 5%;
            left: 5%;
            color: white;
            z-index: 10;
            pointer-events: none; 
            background: rgba(10, 5, 25, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 25px;
            border-radius: 20px;
            border: 1px rgba(255, 255, 255, 0.1) solid;
            box-shadow: 0 10px 40px 0 rgba(199, 125, 255, 0.15);
            max-width: 85%;
            transition: all 0.3s ease;
        }

        .overlay h2 {
            margin: 0 0 5px 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff758f, #ff758f, #c77dff, #00f5d4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientText 6s ease infinite;
        }

        .overlay p {
            margin: 0;
            font-size: 0.95rem;
            color: #e0e0e0;
            opacity: 0.85;
            line-height: 1.4;
        }

        .instruction {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            z-index: 10;
            pointer-events: none;
            letter-spacing: 2px;
            text-align: center;
            width: 90%;
            text-transform: uppercase;
        }

        @keyframes gradientText {
            0% { background-position: 0% 50% }
            50% { background-position: 100% 50% }
            100% { background-position: 0% 50% }
        }

        @media (max-width: 768px) {
            .overlay {
                bottom: 3%;
                left: 5%;
                padding: 15px 20px;
            }
            .overlay h2 { font-size: 1.2rem; }
            .overlay p { font-size: 0.85rem; }
            .instruction { font-size: 0.7rem; top: 15px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="instruction">✨ Chạm xoay không gian • Âm thanh sẽ tự phát khi tương tác ✨</div>

    <div class="overlay">
        <p>Vũ trụ trong tim anh ✨</p>
    </div>

    
    <script>
        // --- 1. SETUP HỆ THỐNG GIAO DIỆN ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2('#03020e', 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 120;
        controls.minDistance = 10;

       
        // --- 2. CẤU HÌNH DỮ LIỆU ĐẦU VÀO ---
        const imageURLs = [
            'images/anh1.jpg',
    'images/anh2.jpg',
    'images/anh3.jpg',
    'images/anh4.jpg',
    'images/anh5.jpg',
    'images/anh6.jpg',
    'images/anh7.jpg',
    'images/anh8.jpg',
    'images/anh9.jpg',
    'images/anh10.jpg',
    'images/anh11.jfif',
    'images/anh12.jfif',
    'images/anh13.jfif',
    'images/anh14.jfif',
    'images/anh15.jfif',
    'images/anh16.jfif',
    'images/anh17.jfif',
    'images/anh18.jfif',
    'images/anh19.jfif',
    'images/anh20.jfif'
        ];

        // --- 3. HIỆU ỨNG BLOOM HDR ĐÃ ĐƯỢC CHỈNH DỊU CHÓI ---
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.4, 0.15);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.5; // Hạ độ chói giúp ảnh người yêu rõ nét
        bloomPass.radius = 1.2;   // Tăng bán kính giúp ánh sáng dịu, mịn màng

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- 4. TẠO THIÊN HÀ XOẮN ỐC ---
        const galaxyParams = { count: 25000, size: 0.25, branches: 4, spin: 1, randomness: 0.5, radius: 35 };
        const galaxyGeo = new THREE.BufferGeometry();
        const galaxyPos = new Float32Array(galaxyParams.count * 3);
        const galaxyColors = new Float32Array(galaxyParams.count * 3);

        for (let i = 0; i < galaxyParams.count; i++) {
            const r = Math.random() * galaxyParams.radius;
            const branchAngle = ((i % galaxyParams.branches) / galaxyParams.branches) * Math.PI * 2;
            const spinAngle = r * galaxyParams.spin;

            const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * r;
            const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * r;
            const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * galaxyParams.randomness * r;

            galaxyPos[i * 3] = Math.cos(branchAngle + spinAngle) * r + randomX;
            galaxyPos[i * 3 + 1] = randomY;
            galaxyPos[i * 3 + 2] = Math.sin(branchAngle + spinAngle) * r + randomZ;

            galaxyColors[i * 3] = 1.0; 
            galaxyColors[i * 3 + 1] = 0.3; 
            galaxyColors[i * 3 + 2] = 0.8;
        }
        galaxyGeo.setAttribute('position', new THREE.BufferAttribute(galaxyPos, 3));
        galaxyGeo.setAttribute('color', new THREE.BufferAttribute(galaxyColors, 3));

        const galaxyMat = new THREE.PointsMaterial({
            size: galaxyParams.size,
            vertexColors: true,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const spiralGalaxy = new THREE.Points(galaxyGeo, galaxyMat);
        scene.add(spiralGalaxy);

        // --- 5. TẠO SAO BĂNG ---
        const meteorCount = 15;
        const meteors = [];
        const meteorMat = new THREE.LineBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.8 });

        for(let i=0; i<meteorCount; i++) {
            const mGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(-3, 2, -3)]);
            const meteor = new THREE.Line(mGeo, meteorMat);
            resetMeteor(meteor);
            scene.add(meteor);
            meteors.push(meteor);
        }

        function resetMeteor(m) {
            m.position.set((Math.random()-0.5)*150, 40 + Math.random()*20, (Math.random()-0.5)*150);
            m.userData = { speedY: -0.8 - Math.random()*0.6, speedX: 0.8 + Math.random()*0.6, speedZ: 0.8 + Math.random()*0.6 };
        }

        // --- 6. NÂNG CẤP HIỆU ỨNG CÁNH HOA ĐÀO 3D REALISTIC ---
        const petalCount = 70;
        const petals = [];

        // Vẽ đường cong biên dạng 2D mềm mại của một cánh hoa đào thực sự
        const petalShape = new THREE.Shape();
        petalShape.moveTo(0, 0);
        petalShape.bezierCurveTo(0.5, 0.5, 1, 1.5, 0.8, 2.5);
        petalShape.bezierCurveTo(0.6, 3.2, 0, 3.5, 0, 3.3); // Chóp hơi khía nhẹ ở giữa
        petalShape.bezierCurveTo(0, 3.5, -0.6, 3.2, -0.8, 2.5);
        petalShape.bezierCurveTo(-1, 1.5, -0.5, 0.5, 0, 0);

        // Tạo khối mỏng nhẹ cho cánh hoa
        const petalGeometry = new THREE.ExtrudeGeometry(petalShape, {
            depth: 0.05,
            bevelEnabled: true,
            bevelSegments: 2,
            steps: 1,
            bevelSize: 0.02,
            bevelThickness: 0.02
        });
        // Di chuyển tâm hình học về giữa cánh hoa để khi xoay trông tự nhiên hơn
        petalGeometry.center(); 

        // Chất liệu bắt sáng cao cấp tạo hiệu ứng 3D như ảnh mẫu
        const petalMaterial = new THREE.MeshStandardMaterial({
            color: '#ffb3c1',
            roughness: 0.4,
            metalness: 0.1,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.85
        });

        // Tạo vùng ánh sáng bổ trợ giúp cánh hoa mềm có khối nổi bật
        const petalLight = new THREE.DirectionalLight('#ffffff', 0.5);
        petalLight.position.set(0, 50, 20);
        scene.add(petalLight);

        for(let i=0; i<petalCount; i++) {
            const petal = new THREE.Mesh(petalGeometry, petalMaterial);
            
            // Phân bổ cánh hoa rải rác ngẫu nhiên trên bầu trời cao
            petal.position.set(
                (Math.random() - 0.5) * 120,
                30 + Math.random() * 40,
                (Math.random() - 0.5) * 120
            );

            // Kích thước ngẫu nhiên to nhỏ sinh động
            const scale = 0.25 + Math.random() * 0.25;
            petal.scale.set(scale, scale, scale);

            // Gán các thông số chuyển động phức hợp: rơi, lắc lư, tự xoay lộn vòng
            petal.userData = {
                speedY: -0.06 - Math.random() * 0.06,                     // Tốc độ rơi từ từ
                swingSpeed: 1 + Math.random() * 1.5,                      // Tốc độ lắc lư qua lại
                swingRadius: 0.03 + Math.random() * 0.03,                 // Biên độ uốn lượn chao đảo
                rotX: (Math.random() - 0.5) * 0.03,                       // Tự xoay lộn trục X
                rotY: 0.01 + Math.random() * 0.02,                        // Tự xoay quanh trục Y
                rotZ: (Math.random() - 0.5) * 0.02,                       // Tự xoay nghiêng cánh hoa
                phase: Math.random() * Math.PI * 2                       // Độ lệch nhịp sinh học ban đầu
            };

            scene.add(petal);
            petals.push(petal);
        }

        // --- 7. TRÁI TIM 3D ---
        const heartShape = new THREE.Shape();
        heartShape.moveTo(0, 0);
        heartShape.bezierCurveTo(0, 0.5, 0.5, 1, 1.2, 1);
        heartShape.bezierCurveTo(2.2, 1, 2.2, -0.7, 2.2, -0.7);
        heartShape.bezierCurveTo(2.2, -1.5, 1.3, -2.5, 0, -3.4);
        heartShape.bezierCurveTo(-1.3, -2.5, -2.2, -1.5, -2.2, -0.7);
        heartShape.bezierCurveTo(-2.2, -0.7, -2.2, 1, -1.2, 1);
        heartShape.bezierCurveTo(-0.5, 1, 0, 0.5, 0, 0);

        const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 0.4, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 });
        const heartMat = new THREE.MeshBasicMaterial({ color: '#ff3366', transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const heartMesh = new THREE.Mesh(heartGeo, heartMat);
        heartMesh.scale.set(0.6, 0.6, 0.6);
        heartMesh.rotation.z = Math.PI; 
        heartMesh.position.set(0, 2, 0);
        scene.add(heartMesh);

        // --- 8. KHUNG TRANH CÔNG NGHỆ HD BO GÓC ---
        const photoGroups = [];
        const textureLoader = new THREE.TextureLoader();

        function createRoundedTexture(url, callback) {
            if(!url || url.includes('DÁN_MÃ_BASE64')) return;
            textureLoader.load(url, (originalTexture) => {
                const img = originalTexture.image;
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');

                const radius = Math.min(img.width, img.height) * 0.08; 
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(img.width - radius, 0);
                ctx.quadraticCurveTo(img.width, 0, img.width, radius);
                ctx.lineTo(img.width, img.height - radius);
                ctx.quadraticCurveTo(img.width, img.height, img.width - radius, img.height);
                ctx.lineTo(radius, img.height);
                ctx.quadraticCurveTo(0, img.height, 0, img.height - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.clip();
                ctx.drawImage(img, 0, 0);

                const newTexture = new THREE.CanvasTexture(canvas);
                newTexture.encoding = THREE.sRGBEncoding;
                callback(newTexture);
            });
        }

        imageURLs.forEach((url, index) => {
            createRoundedTexture(url, (roundedTexture) => {
                const photoGeo = new THREE.PlaneGeometry(6, 7.5);
                const photoMat = new THREE.MeshBasicMaterial({
                    map: roundedTexture,
                    side: THREE.DoubleSide,
                    transparent: false,
                    opacity: 1,
                    toneMapped: false
                });
                const mesh = new THREE.Mesh(photoGeo, photoMat);

                const container = new THREE.Group();
                const angle = (index / 5) * Math.PI * 2;
                container.position.set(Math.cos(angle) * 22, (Math.random() - 0.5) * 6, Math.sin(angle) * 22);

                container.userData = { angle: angle, speed: 0.002 + index*0.0004, yPhase: Math.random()*50 };
                container.add(mesh);
                scene.add(container);
                photoGroups.push(container);
            });
        });

        // --- 9. VÒNG LẶP ANIMATION ĐIỆN ẢNH ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            if(!controls.state == -1) {
                camera.position.x = Math.sin(time * 0.05) * 55;
                camera.position.z = Math.cos(time * 0.05) * 55;
            }
            controls.update();

            spiralGalaxy.rotation.y = time * 0.04;
            const dynamicColor = new THREE.Color().setHSL((time * 0.015) % 1.0, 0.9, 0.6);
            galaxyMat.color.copy(dynamicColor);

            const pulse = 0.5 + Math.sin(time * 2.5) * 0.08;
            heartMesh.scale.set(pulse, pulse, pulse);
            heartMesh.rotation.y = time * 0.5;

            meteors.forEach(m => {
                m.position.y += m.userData.speedY;
                m.position.x += m.userData.speedX;
                m.position.z += m.userData.speedZ;
                if(m.position.y < -20) resetMeteor(m);
            });

            // É. Xử lý hoạt họa cánh hoa đào rơi uốn lượn nhịp nhàng sinh động
            petals.forEach(p => {
                // Rơi từ từ xuống
                p.position.y += p.userData.speedY;
                // Tạo hiệu ứng chao đảo, dao động sin/cos như gió thổi
                p.position.x += Math.sin(time * p.userData.swingSpeed + p.userData.phase) * p.userData.swingRadius;
                p.position.z += Math.cos(time * p.userData.swingSpeed + p.userData.phase) * p.userData.swingRadius;
                
                // Cánh hoa tự lộn vòng ngẫu nhiên trong không gian
                p.rotation.x += p.userData.rotX;
                p.rotation.y += p.userData.rotY;
                p.rotation.z += p.userData.rotZ;

                // Nếu chạm đáy không gian, reset cánh hoa lên đỉnh để lặp lại vô tận
                if(p.position.y < -30) {
                    p.position.y = 40 + Math.random() * 10;
                    p.position.x = (Math.random() - 0.5) * 120;
                    p.position.z = (Math.random() - 0.5) * 120;
                }
            });

            photoGroups.forEach(photo => {
                photo.userData.angle += photo.userData.speed;
                photo.position.x = Math.cos(photo.userData.angle) * 22;
                photo.position.z = Math.sin(photo.userData.angle) * 22;
                photo.position.y += Math.sin(time + photo.userData.yPhase) * 0.012;
                photo.lookAt(camera.position); 
            });

            composer.render();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
